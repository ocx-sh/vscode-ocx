name: Get Publisher Profile ID

# TEMPORARY one-shot helper. Prints the Entra app's Azure DevOps profile id so
# it can be added to the `ocx-sh` Marketplace publisher as a Contributor.
# Delete this workflow once the id has been captured.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  print-id:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Azure login (Entra federated)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Print Azure DevOps profile id
        run: |
          id=$(az rest \
            -u https://app.vssps.visualstudio.com/_apis/profile/profiles/me \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query id -o tsv)
          echo "PUBLISHER_PROFILE_ID=${id}"
