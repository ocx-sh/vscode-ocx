name: Release

# Publishing is INERT until the relevant identity/secrets are configured:
#   - VS Code Marketplace → Microsoft Entra (federated OIDC, no PAT). Requires
#     repo secrets AZURE_CLIENT_ID + AZURE_TENANT_ID for an Entra app
#     registration whose GitHub federated credential trusts
#     subject `repo:ocx-sh/vscode-ocx:environment:release`, and which is added
#     as a member of the `ocx-sh` Marketplace publisher.
#   - Open VSX → OVSX_PAT secret.
# Without them, the workflow still builds, tests, packages, and attaches the
# .vsix to a GitHub Release; the marketplace publish steps are skipped.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release / attach the .vsix
  id-token: write # mint the OIDC token for Entra federated auth

jobs:
  release:
    runs-on: ubuntu-latest
    # The `release` environment fixes the OIDC subject to
    # `repo:ocx-sh/vscode-ocx:environment:release` so it matches the Entra
    # app's federated credential.
    environment: release
    # Job-level env so the secret-gating `if:` on the publish steps can read it.
    # (A step's own `env:` block is not visible to that step's `if:` condition.)
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Verify (lint + types + build)
        run: npm run check

      - name: Test (headless)
        run: xvfb-run -a npm test

      - name: Package VSIX
        run: npm run package

      - name: Attach VSIX to GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: '*.vsix'
          generate_release_notes: true

      - name: Azure login (Entra federated)
        if: env.AZURE_CLIENT_ID != ''
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish to VS Code Marketplace
        if: env.AZURE_CLIENT_ID != ''
        run: npx --yes @vscode/vsce publish --no-dependencies --packagePath *.vsix --azure-credential

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx publish *.vsix --pat "$OVSX_PAT"
